<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrackIt! - Your Ultimate Interview Assistant</title>
    <meta name="description" content="Ace your online assessments with CrackIt! A smart background tool that provides instant answers right when you need them.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <main class="hero-section">
        <div class="hero-content">
            <!-- Left Side: Text and Download -->
            <div class="text-content">
                <h1 class="title">Ace Your Next <br><span class="highlight">Interview</span> With Ease.</h1>
                <p class="description">
                    CrackIt! runs silently in the background during your online assessments. Simply copy a question, and get the perfect answer copied to your clipboard instantly.
                </p>
                <div class="action-wrapper">
                    <button class="download-btn">
                        <i class="fa-brands fa-windows"></i> Download for Windows
                    </button>
                    <span class="version-info">Version 4.0 • Free to use</span>
                </div>
            </div>
            
            <!-- Right Side: Video -->
            <div class="video-content">
                <div class="video-wrapper">
                    <video id="hero-video" src="gh/process.mp4" playsinline></video>
                    
                    <!-- Glossy Custom Controllers -->
                    <div class="custom-controls">
                        <button class="control-btn play-pause" id="play-pause-btn" aria-label="Play or Pause">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <div class="progress-container" id="progress-container">
                            <div class="progress-bar" id="progress-bar"></div>
                        </div>
                        <span class="time-display" id="time-display">0:00 / 0:00</span>
                        <button class="control-btn mute" id="mute-btn" aria-label="Mute or Unmute">
                            <i class="fa-solid fa-volume-high"></i>
                        </button>
                    </div>
                </div>
                <!-- Decorative background elements for premium feel -->
                <div class="glow-orb purple"></div>
                <div class="glow-orb blue"></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
